name: voxbridge
description: Voice bridge for speech impaired individuals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # State management
  provider: ^6.1.1

  # Text to speech
  flutter_tts: ^3.8.5

  # Translation
  translator: ^1.0.0

  # Fonts
  google_fonts: ^6.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # Cupertino icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true